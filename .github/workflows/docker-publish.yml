name: Docker Publish

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch,prefix=branch-
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Guard image volume roots
        shell: bash
        run: |
          set -euo pipefail
          preflight_tag="${{ steps.image.outputs.name }}:volume-guard-${{ github.sha }}"
          docker build --file Dockerfile --tag "$preflight_tag" .
          volumes_json="$(docker image inspect "$preflight_tag" --format '{{json .Config.Volumes}}')"
          echo "Config.Volumes=$volumes_json"

          if [[ "$volumes_json" != "null" ]]; then
            if echo "$volumes_json" | grep -Eq '"/ssm\/sources\/?"|"/ssm\/override\/?"'; then
              echo "ERROR: image must not declare /ssm/sources or /ssm/override as container volume roots." >&2
              exit 1
            fi
          fi

          docker image rm -f "$preflight_tag" >/dev/null 2>&1 || true

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
